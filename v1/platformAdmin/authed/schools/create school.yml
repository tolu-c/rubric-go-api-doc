info:
  name: create school
  type: http
  seq: 1

http:
  method: POST
  url: "{{host}}/schools"
  headers:
    - name: Idempotency-Key
      value: 91CA4E15-83C4-43DD-BE82-8CB92E17FC84
  body:
    type: json
    data: |-
      {
        "slug": "marade",
        "name": "Marade Scholars Academy",
        "contact_email": "contact@marade.com",
        "scholar_id_prefix": "MSA",
        "scholar_id_digits": 6,
        "initial_admin": {
          "email": "mary@marade.com",
          "display_name": "Mary"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{host}}/schools"
      method: POST
      headers:
        - name: Idempotency-Key
          value: 91CA4E15-83C4-43DD-BE82-8CB92E17FC84
      body:
        type: json
        data: |-
          {
            "slug": "marade",
            "name": "Marade Scholars Academy",
            "contact_email": "contact@marade.com",
            "scholar_id_prefix": "MSA",
            "scholar_id_digits": 6,
            "initial_admin": {
              "email": "mary@marade.com",
              "display_name": "Mary"
            }
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: content-type
          value: application/json; charset=utf-8
        - name: x-request-id
          value: 43828eb7-c4d8-489b-a00a-f5dfbbc9049f
        - name: date
          value: Tue, 19 May 2026 12:39:32 GMT
        - name: content-length
          value: "460"
      body:
        type: json
        data: |-
          {
            "school": {
              "id": "21a49816-d695-454a-ac24-bff114e17ec0",
              "slug": "marade",
              "name": "Marade Scholars Academy",
              "contact_email": "contact@marade.com",
              "status": "active",
              "dns_status": "pending",
              "scholar_id_prefix": "MSA",
              "scholar_id_digits": 6,
              "created_at": "2026-05-19T13:39:31.762466+01:00"
            },
            "initial_admin": {
              "user_id": "fbf14c51-80ab-483c-a842-6ac0262e3d35",
              "email": "mary@marade.com"
            },
            "dns_hint": "School DNS is pending; the school becomes reachable once DNS is confirmed."
          }
  - name: error - idempotency key required
    request:
      url: "{{host}}/schools"
      method: POST
      headers:
        - name: Idempotency-Key
          value: 91CA4E15-83C4-43DD-BE82-8CB92E17FC84
          disabled: true
      body:
        type: json
        data: |-
          {
            "slug": "marade",
            "name": "Marade Scholars Academy",
            "contact_email": "contact@marade.com",
            "scholar_id_prefix": "MSA",
            "scholar_id_digits": 6,
            "initial_admin": {
              "email": "mary@marade.com",
              "display_name": "Mary"
            }
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: content-type
          value: application/json; charset=utf-8
        - name: x-request-id
          value: 5197358d-3b03-44ff-9b90-b8edff52ac62
        - name: date
          value: Tue, 19 May 2026 12:40:22 GMT
        - name: content-length
          value: "100"
      body:
        type: json
        data: |-
          {
            "error": {
              "code": "IDEMPOTENCY_KEY_REQUIRED",
              "message": "a valid Idempotency-Key header is required"
            }
          }
