info:
  name: list notifications
  type: http
  seq: 1

http:
  method: GET
  url: "{{host}}?unread=true&page=3"
  params:
    - name: unread
      value: "true"
      type: query
    - name: page
      value: "3"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
