info:
  name: login
  type: http
  seq: 2

http:
  method: POST
  url: "{{auth}}/login"
  body:
    type: json
    data: |+
      {
        "identifier": "mary@marade.com",
        "password": "A!s@D#f$:0192",
        "active_role": "school_admin"
      }

  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
