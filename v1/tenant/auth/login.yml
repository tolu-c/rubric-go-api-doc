    request:
      url: "{{auth}}/login"
      method: POST
      body:
        type: json
        data: |-
          {
            "identifier":"mary@marade.com",
            "password":"A!s@D#f$:0192",
            "active_role":"staff"
            
          }
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: content-type
          value: application/json; charset=utf-8
        - name: x-request-id
          value: 49250fa8-83e7-4fa0-8d11-8521c70bc3ae
        - name: date
          value: Wed, 20 May 2026 18:06:49 GMT
        - name: content-length
